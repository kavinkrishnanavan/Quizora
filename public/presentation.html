<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz-Wiz</title>
  <link rel="icon" type="image/png" href="favicon_2.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --primary: #2563eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --status-bg: #eff6ff;
      --status-text: #2563eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #263145;
        --shadow: 0 10px 18px -6px rgba(0, 0, 0, 0.55);
        --status-bg: rgba(37, 99, 235, 0.18);
        --status-text: #93c5fd;
      }
    }

    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
    }

    .app-shell {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
      padding: 20px;
      align-items: flex-start;
    }

    .container {
      flex: 1;
      max-width: 980px;
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      width: 320px;
      min-width: 260px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      position: sticky;
      top: 20px;
    }

    @media (max-width: 1100px) {
      .app-shell { flex-direction: column; }
      .container { max-width: 100%; }
      .sidebar { width: 100%; position: static; }
    }

    .tabs { display: flex; gap: 10px; margin: 10px 0 20px; flex-wrap: wrap; }
    .tab { text-decoration: none; padding: 10px 12px; border: 1px solid var(--border); border-radius: 999px; color: inherit; background: transparent; font-weight: 700; }
    .tab.active { background: rgba(37, 99, 235, 0.12); border-color: rgba(37, 99, 235, 0.45); color: var(--text); }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { color: var(--muted); font-weight: 700; font-size: 0.92rem; }
    input, select, textarea {
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: inherit;
      outline: none;
    }
    textarea { resize: vertical; min-height: 110px; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
    button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }
    button.primary { background: var(--primary); border-color: transparent; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { transform: translateY(-1px); }

    .status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--status-bg);
      color: var(--status-text);
      border: 1px solid rgba(37, 99, 235, 0.22);
      font-weight: 700;
    }

    .preview-wrap { margin-top: 18px; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    iframe { width: 100%; height: 720px; border: 0; background: white; }
    .hint { color: var(--muted); font-size: 0.9rem; margin-top: 10px; }

    /* Sidebar history */
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .sidebar-title { font-weight: 800; font-size: 1.05rem; }
    .sidebar-subtitle { color: var(--muted); font-size: 0.85rem; }
    .history-list { display: grid; gap: 10px; margin-top: 12px; max-height: 560px; overflow: auto; padding-right: 4px; }
    .history-entry { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: rgba(127,127,127,0.04); text-align: left; display: grid; gap: 6px; cursor: pointer; transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease; }
    .history-entry:hover { border-color: rgba(37, 99, 235, 0.45); background: rgba(37, 99, 235, 0.08); transform: translateY(-1px); }
    .history-entry.active { border-color: rgba(37, 99, 235, 0.8); background: rgba(37, 99, 235, 0.12); }
    .history-entry-title { font-weight: 800; font-size: 0.98rem; }
    .history-entry-meta { color: var(--muted); font-size: 0.82rem; }
    .history-entry-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .history-delete { background: transparent; color: inherit; border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
    .history-delete:hover { border-color: rgba(239, 68, 68, 0.55); color: #ef4444; }

    /* Hidden host used for PDF rendering */
    #pdfHost { position: fixed; left: -99999px; top: 0; width: 1280px; }
  </style>
</head>
<body style="background-image: url(background.png);">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <div class="sidebar-title">Notes</div>
          <div class="sidebar-subtitle">Reload previous notes.</div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <button id="accountBtn" type="button" class="history-delete" title="Account">⚙️</button>
          <button id="clearHistoryBtn" type="button" class="history-delete" title="Clear selection" style="display:none;"></button>
        </div>
      </div>
      <div id="historyList" class="history-list"></div>
    </aside>

    <div class="container">
      <div style="display: flex; align-items: center; gap: 10px;">
            <img id="title" src="favicon.png" class="zoom" style="width: 200px;" alt="Quiz-Wiz">
            <h1>Quiz-Wiz : Worksheets Empowered 📃🖥️🏫</h1>
        </div>
         <h1 id="mobile1">Quiz-Wiz</h1>
         <h3 id="mobile2">Worksheets Empowered</h3>
        <div style="text-align: right;">
            <h3 style="margin-left: 0px; margin-top: 10px; color: #3995ff; margin: 0px;">By Kavin</h3>
            <a href="https://forms.gle/rX2LhHorafSnso4B9" target="_blank" rel="noopener noreferrer" style="margin-left: 8%; margin-top: -100px;">Please Give Feedback ⭐ !</a>
        </div>

      <div class="tabs">
        <a class="tab" href="index.html">Personalized Tests</a>
        <a class="tab" href="baseline.html">Baseline Test</a>
        <a class="tab" href="image.html">Worksheet Marker</a>
        <a class="tab active" href="presentation.html">Notes Maker</a>
      </div>
      <hr>

      <div class="form-grid">
        <div class="field">
          <label>Topic</label>
          <input id="topic" placeholder="e.g. Linear Equations" value="Linear Equations" />
        </div>
        <div class="field">
          <label>Audience</label>
          <input id="audience" placeholder="e.g. Grade 9 (KSSM)" value="Grade 9 (KSSM)" />
        </div>
        <div class="field">
          <label>Slides</label>
          <input id="slideCount" type="number" min="3" max="20" value="8" />
        </div>
        <div class="field">
          <label>Tone</label>
          <select id="tone">
            <option selected>Clear, student-friendly</option>
            <option>Exam-focused</option>

            <option>Concise and formal</option>
          </select>
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label>Extra instructions (optional)</label>
          <textarea id="extra" placeholder="e.g. Include 1 real-world example and 1 common mistake slide."></textarea>

      <div class="actions">
        <button class="primary" id="genBtn" type="button">Generate Presentation</button>
        <button id="downloadPdfBtn" type="button" disabled>Download PDF</button>

      <div id="status" class="status">Ready.</div>
     

      <div class="preview-wrap" style="display: none;">

    </div>
  </div>

  <div id="pdfHost" aria-hidden="true"></div>
  <style id="pdfDeckStyle"></style>

  <div id="accountModal" class="account-modal" style="display:none; position: fixed; inset: 0; z-index: 10002;">
    <div id="accountBackdrop" style="position:absolute; inset:0; background: rgba(0,0,0,0.55);"></div>
    <div role="dialog" aria-modal="true" aria-labelledby="accountTitle" style="position: relative; max-width: 520px; margin: 12vh auto; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 18px;">
      <div style="display:flex; align-items:center; justify-content: space-between; gap: 12px; margin-bottom: 12px;">
        <div>
          <div id="accountTitle" style="font-weight: 800; font-size: 1.1rem;">Account</div>
          <div style="color: var(--muted); font-size: 0.9rem;" id="authStatus">Enter email and password to sign in.</div>
        </div>
        <button type="button" id="accountClose" style="background: transparent; color: inherit; border: 1px solid var(--border); padding: 8px 10px; border-radius: 10px;">X</button>

      <div id="accountSignedOut" style="display:none;">

        </div>
        <div class="actions" style="margin-top: 12px;">
          <button type="button" id="signUpBtn">Create Account</button>
          <button type="button" id="signInBtn">Sign In</button>
        </div>
      </div>

      <div id="accountSignedIn" style="display:none;">
        <div style="color: var(--muted); font-size: 0.9rem;">Signed in as</div>
        <div id="accountEmailDisplay" style="font-weight: 800; margin-bottom: 12px;"></div>
        <button type="button" id="signOutBtn" style="padding: 10px 12px; margin-top: 0; background: transparent; color: inherit; border: 1px solid var(--border);">Sign Out</button>

  </div>

  <script>

<script>


    const previewFrame = document.getElementById("previewFrame");
    const statusEl = document.getElementById("status");
    const genBtn = document.getElementById("genBtn");
    const downloadPdfBtn = document.getElementById("downloadPdfBtn");
    const pdfHost = document.getElementById("pdfHost");
    const pdfDeckStyle = document.getElementById("pdfDeckStyle");
    const historyListEl = document.getElementById("historyList");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const accountBtn = document.getElementById("accountBtn");

    const accountModal = document.getElementById("accountModal");
    const accountBackdrop = document.getElementById("accountBackdrop");
    const accountClose = document.getElementById("accountClose");
    const authStatus = document.getElementById("authStatus");
    const accountSignedOut = document.getElementById("accountSignedOut");
    const accountSignedIn = document.getElementById("accountSignedIn");
    const accountEmailDisplay = document.getElementById("accountEmailDisplay");
    const authEmail = document.getElementById("authEmail");
    const authPassword = document.getElementById("authPassword");
    const signUpBtn = document.getElementById("signUpBtn");
    const signInBtn = document.getElementById("signInBtn");
    const signOutBtn = document.getElementById("signOutBtn");

    const HISTORY_TYPE = "presentation";
    let firebaseReady = false;
    let currentUser = null;

    let historyItems = [];
    let activeHistoryId = "";
    let pendingLoadId = new URL(window.location.href).searchParams.get("id") || "";

    let lastDeck = null;
    let lastHtml = "";
    let lastFilename = "Presentation";

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function sanitizeFilename(name) {
      return String(name || "Presentation")
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 120);
    }

    function updateUrlId(id) {
      const url = new URL(window.location.href);
      if (id) url.searchParams.set("id", id);
      else url.searchParams.delete("id");
      window.history.replaceState({}, "", url.toString());
    }

    function setActiveHistory(id) {
      activeHistoryId = String(id || "");
      const entries = document.querySelectorAll(".history-entry");
      entries.forEach((entry) => {
        if (entry.dataset?.id === activeHistoryId) entry.classList.add("active");
        else entry.classList.remove("active");
      });
    }

    function openAccountModal() {
      if (!accountModal) return;
      accountModal.style.display = "block";
      document.body.style.overflow = "hidden";
    }

    function closeAccountModal() {
      if (!accountModal) return;
      accountModal.style.display = "none";
      document.body.style.overflow = "";
    }

    function updateAuthUi(user) {
      currentUser = user || null;
      if (!authStatus || !accountSignedOut || !accountSignedIn) return;
      if (currentUser) {
        authStatus.innerText = "Signed in. History is stored in Firebase.";
        accountSignedOut.style.display = "none";
        accountSignedIn.style.display = "block";
        if (accountEmailDisplay) accountEmailDisplay.innerText = currentUser.email || "";
      } else {
        authStatus.innerText = firebaseReady ? "Sign in to save/load history." : "Firebase not configured yet.";
        accountSignedOut.style.display = "block";
        accountSignedIn.style.display = "none";
        if (accountEmailDisplay) accountEmailDisplay.innerText = "";
      }
    }

    async function initFirebase() {
      if (!window.firebase || !firebase?.initializeApp) return;
      try {
        const res = await fetch("/.netlify/functions/firebase-config");
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.config) throw new Error(data?.error || "Missing Firebase config");
        firebase.initializeApp(data.config);
        firebaseReady = true;
        firebase.auth().onAuthStateChanged(async (user) => {
          updateAuthUi(user);
          if (user) {
            await loadHistory();
            if (pendingLoadId) {
              const id = pendingLoadId;
              pendingLoadId = "";
              loadHistoryItem(id, { autoPdf: true });
            }
          } else {
            renderHistoryList([]);
          }
        });
      } catch (err) {
        firebaseReady = false;
        updateAuthUi(null);
        renderHistoryList([]);
      }
    }

    async function getAuthToken() {
      if (!firebaseReady || !firebase.auth().currentUser) return "";
      return firebase.auth().currentUser.getIdToken();
    }

    async function signUp() {
      if (!firebaseReady) return alert("Firebase is not configured yet.");
      const email = String(authEmail?.value || "").trim();
      const password = String(authPassword?.value || "").trim();
      if (!email || password.length < 6) return alert("Enter email + password (min 6 chars).");
      await firebase.auth().createUserWithEmailAndPassword(email, password);
    }

    async function signIn() {
      if (!firebaseReady) return alert("Firebase is not configured yet.");
      const email = String(authEmail?.value || "").trim();
      const password = String(authPassword?.value || "").trim();
      if (!email || !password) return alert("Enter email + password.");
      await firebase.auth().signInWithEmailAndPassword(email, password);
    }

    async function signOut() {
      if (!firebaseReady) return;
      await firebase.auth().signOut();
    }

    async function fetchHistoryItems() {
      const token = await getAuthToken();
      if (!token) return [];
      const res = await fetch("/.netlify/functions/history?limit=50", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.error || "Failed to load history.");
      const items = Array.isArray(data?.items) ? data.items : [];
      return items.map((item) => {
        let payload = null;
        try { payload = item.payloadJson ? JSON.parse(item.payloadJson) : null; } catch (_) { payload = null; }
        return { ...item, payload };
      }).filter((x) => x?.payload?.type === HISTORY_TYPE);
    }

    async function loadHistory() {
      if (!firebaseReady || !currentUser) return;
      statusEl.textContent = "Loading history…";
      try {
        historyItems = await fetchHistoryItems();
        renderHistoryList(historyItems);
        statusEl.textContent = "Ready.";
      } catch (err) {
        renderHistoryList([]);
        statusEl.textContent = "History load failed.";
      }
    }

    async function saveHistory(payload) {
      const token = await getAuthToken();
      if (!token) throw new Error("Sign in to save history.");
      const res = await fetch("/.netlify/functions/history", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ payload })
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.error || "Failed to save history.");
      return data?.id || "";
    }

    async function deleteHistoryEntry(id) {
      const safeId = String(id || "").trim();
      if (!safeId) return;
      const ok = confirm("Delete this history entry?");
      if (!ok) return;
      const token = await getAuthToken();
      if (!token) return alert("Sign in to delete history.");
      const res = await fetch(`/.netlify/functions/history?id=${encodeURIComponent(safeId)}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) return alert(data?.error || "Failed to delete history.");
      if (activeHistoryId === safeId) {
        activeHistoryId = "";
        updateUrlId("");
      }
      await loadHistory();
    }

    function renderHistoryList(items) {
      if (!historyListEl) return;
      const listItems = Array.isArray(items) ? items : [];
      historyListEl.innerHTML = "";
      if (!firebaseReady || !currentUser) {
        historyListEl.innerHTML = "<div class=\"history-entry-meta\">Sign in to load/save history.</div>";
        return;
      }
      if (!listItems.length) {
        historyListEl.innerHTML = "<div class=\"history-entry-meta\">No history found yet.</div>";
        return;
      }

      listItems.forEach((item) => {
        const entry = document.createElement("div");
        entry.className = "history-entry";
        entry.dataset.id = item.id;

        const row = document.createElement("div");
        row.className = "history-entry-row";

        const title = document.createElement("div");
        title.className = "history-entry-title";
        title.innerText = item.payload?.title || "Presentation";
        row.appendChild(title);

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "history-delete";
        delBtn.innerText = "Delete";
        delBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteHistoryEntry(item.id);
        });
        row.appendChild(delBtn);
        entry.appendChild(row);

        const createdAt = item.payload?.createdAt || item.createdAt || "";
        const meta = document.createElement("div");
        meta.className = "history-entry-meta";
        meta.innerText = createdAt ? new Date(createdAt).toLocaleString() : "Saved";
        entry.appendChild(meta);

        if (item.payload?.summary) {
          const summary = document.createElement("div");
          summary.className = "history-entry-meta";
          summary.innerText = item.payload.summary;
          entry.appendChild(summary);
        }

        entry.addEventListener("click", () => loadHistoryItem(item.id, { autoPdf: true }));
        historyListEl.appendChild(entry);
      });

      if (activeHistoryId) setActiveHistory(activeHistoryId);
    }

    async function loadHistoryItem(id, { autoPdf } = {}) {
      const safeId = String(id || "").trim();
      if (!safeId) return;
      const item = historyItems.find((x) => String(x?.id || "") === safeId);
      if (!item?.payload) return alert("History entry missing data.");

      setActiveHistory(safeId);
      updateUrlId(safeId);

      const inputs = item.payload?.inputs && typeof item.payload.inputs === "object" ? item.payload.inputs : {};
      document.getElementById("topic").value = inputs.topic || "";
      document.getElementById("audience").value = inputs.audience || "";
      document.getElementById("slideCount").value = inputs.slideCount || 8;
      document.getElementById("tone").value = inputs.tone || "Clear, student-friendly";
      document.getElementById("extra").value = inputs.extra || "";

      lastDeck = item.payload?.deck || null;
      if (!lastDeck) return alert("This history entry is missing deck data.");

      lastHtml = buildDeckHtml(lastDeck);
      lastFilename = sanitizeFilename(lastDeck?.title || item.payload?.title || "Presentation");
      previewFrame.srcdoc = lastHtml;
      downloadPdfBtn.disabled = false;
      statusEl.textContent = "History loaded.";

      if (autoPdf) setTimeout(() => downloadPdf(), 150);
    }

    function buildDeckHtml(deck) {

      const title = escapeHtml(deck?.title || "Presentation");
      const subtitle = escapeHtml(deck?.subtitle || "");
      const slides = Array.isArray(deck?.slides) ? deck.slides : [];

      const slideEls = slides.map((slide, idx) => {
        const heading = escapeHtml(slide?.heading || `Slide ${idx + 1}`);
        const bullets = Array.isArray(slide?.bullets) ? slide.bullets : [];
        const paragraphs = Array.isArray(slide?.paragraphs) ? slide.paragraphs : [];

        const paragraphsHtml = paragraphs.length
          ? paragraphs.slice(0, 3).map(p => `<p class="para">${escapeHtml(p)}</p>`).join("")
          : "";
        const bulletsHtml = bullets.length
          ? `<ul class="bullets">${bullets.map(b => `<li>${escapeHtml(b)}</li>`).join("")}</ul>`
          : "";

        const isTitle = idx === 0;
        const titleBlock = isTitle
          ? `<div class="title">
              <div class="kicker">Quiz-Wiz Presentation</div>
              <h1>${title}</h1>
              ${subtitle ? `<div class="subtitle">${subtitle}</div>` : ""}
            </div>`
          : `<h2>${heading}</h2>`;

        const middleHtml = isTitle
          ? `<div class="title-body">${paragraphsHtml}${bulletsHtml}</div>`
          : `<div class="content"><div class="text">${paragraphsHtml}${bulletsHtml}</div></div>`;

        return `
          <section class="slide ${isTitle ? "is-title" : ""}">
            <div class="slide-inner">
              <div class="top">
                ${titleBlock}
                ${!isTitle && subtitle ? `<div class="deck-subtitle">${subtitle}</div>` : ""}
              </div>
              <div class="middle">${middleHtml}</div>
              <div class="bottom">
                <div class="footer">
                  <span class="page">${idx + 1} / ${slides.length}</span>
                  <span class="topic">${title}</span>
                </div>
              </div>
            </div>
          </section>
        `;
      }).join("");

      const css = `
        .deck { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; width: 1280px; background: #0b1220; }
        .deck .slide {
          width: 1280px; height: 720px; box-sizing: border-box; padding: 56px; margin: 0;
          background: radial-gradient(1200px 720px at 10% 10%, rgba(37, 99, 235, 0.35), transparent 55%),
                      radial-gradient(900px 600px at 90% 10%, rgba(16, 185, 129, 0.22), transparent 50%),
                      linear-gradient(180deg, #0b1220, #0f172a);
          color: #e2e8f0; border-bottom: 1px solid rgba(148, 163, 184, 0.08); position: relative;
        }
        .deck .slide-inner { height: 100%; display: flex; flex-direction: column; justify-content: space-between; gap: 18px; }
        .deck .middle { flex: 1; overflow: hidden; }
        .deck .kicker { font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; font-size: 12px; color: rgba(226, 232, 240, 0.72); }
        .deck h1 { margin: 10px 0 6px; font-size: 56px; line-height: 1.05; }
        .deck .subtitle { font-size: 22px; color: rgba(226, 232, 240, 0.8); font-weight: 700; }
        .deck h2 { margin: 0; font-size: 42px; line-height: 1.1; }
        .deck .deck-subtitle { margin-top: 10px; color: rgba(226, 232, 240, 0.7); font-weight: 700; }
        .deck .para { margin: 0 0 14px; font-size: 22px; line-height: 1.28; color: rgba(226, 232, 240, 0.92); }
        .deck .bullets { margin: 8px 0 0; padding-left: 28px; font-size: 26px; line-height: 1.2; }
        .deck .bullets li { margin: 12px 0; }
        .deck .footer { display: flex; justify-content: space-between; gap: 18px; font-weight: 800; font-size: 14px; color: rgba(226, 232, 240, 0.7); }
      `.trim();

      return `<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>${title}</title>
  <style>${css}</style>
</head>
<body>
  <div class="deck">${slideEls}</div>
</body>
</html>`;
    }

    async function generate() {
      genBtn.disabled = true;
      downloadPdfBtn.disabled = true;
      statusEl.textContent = "Generating with Groq…";

      try {
        const topic = document.getElementById("topic").value.trim();
        const audience = document.getElementById("audience").value.trim();
        const slideCount = Number.parseInt(document.getElementById("slideCount").value, 10) || 8;
        const tone = document.getElementById("tone").value.trim();
        const extra = document.getElementById("extra").value.trim();

        const res = await fetch("/.netlify/functions/presentation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, audience, slideCount, tone, extra })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
        if (!data?.deck) throw new Error("No deck returned.");

        lastDeck = data.deck;
        lastHtml = buildDeckHtml(lastDeck);
        lastFilename = sanitizeFilename(lastDeck?.title || topic || "Presentation");

        previewFrame.parentElement.style.display = "block";

        previewFrame.srcdoc = lastHtml;
        statusEl.textContent = `Done: ${lastDeck?.title || topic}`;
        downloadPdfBtn.disabled = false;

        const payload = {
          type: HISTORY_TYPE,
          title: lastDeck?.title || topic || "Presentation",
          createdAt: new Date().toISOString(),
          summary: `${audience || "Audience"} • ${slideCount} slides`,
          deck: lastDeck,
          inputs: { topic, audience, slideCount, tone, extra }
        };

        if (currentUser) {
          const savedId = await saveHistory(payload);
          await loadHistory();
          if (savedId) {
            setActiveHistory(savedId);
            updateUrlId(savedId);
          }
        } else {
          statusEl.textContent += " (Sign in to save history)";
        }
      } catch (err) {
        statusEl.textContent = "Error: " + (err?.message || "Unable to generate");
        previewFrame.srcdoc = "";
      } finally {
        genBtn.disabled = false;
      }
    }

    async function downloadPdf() {
      if (!lastHtml) return;
      downloadPdfBtn.disabled = true;
      statusEl.textContent = "Rendering PDF…";

      try {
        const hostDoc = new DOMParser().parseFromString(lastHtml, "text/html");
        const styleText = hostDoc.querySelector("style")?.textContent || "";
        const deckEl = hostDoc.querySelector(".deck");
        if (!deckEl) throw new Error("Deck element not found.");

        pdfHost.innerHTML = "";
        pdfDeckStyle.textContent = styleText;
        pdfHost.appendChild(deckEl);

        const slides = Array.from(pdfHost.querySelectorAll(".slide"));
        if (!slides.length) throw new Error("No slides found to export.");

        const html2canvasFn = window.html2canvas;
        if (typeof html2canvasFn !== "function") throw new Error("html2canvas not available.");

        const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || null;
        if (typeof jsPDFCtor !== "function") throw new Error("jsPDF not available.");

        const pageW = 1280;
        const pageH = 720;
        const pdf = new jsPDFCtor({ unit: "px", format: [pageW, pageH], orientation: "landscape" });

        for (let i = 0; i < slides.length; i++) {
          const canvas = await html2canvasFn(slides[i], { scale: 2, backgroundColor: "#0b1220" });
          const imgData = canvas.toDataURL("image/jpeg", 0.98);
          if (i > 0) pdf.addPage([pageW, pageH], "landscape");
          pdf.addImage(imgData, "JPEG", 0, 0, pageW, pageH);
        }

        pdf.save(`${lastFilename}.pdf`);
        statusEl.textContent = "PDF downloaded.";
      } catch (err) {
        statusEl.textContent = "PDF error: " + (err?.message || "Unable to export");
      } finally {
        pdfHost.innerHTML = "";
        pdfDeckStyle.textContent = "";
        downloadPdfBtn.disabled = false;
      }
    }

    genBtn.addEventListener("click", generate);
    downloadPdfBtn.addEventListener("click", downloadPdf);

    clearHistoryBtn?.addEventListener("click", () => {
      activeHistoryId = "";
      updateUrlId("");
      setActiveHistory("");
      lastDeck = null;
      lastHtml = "";
      previewFrame.srcdoc = "";
      downloadPdfBtn.disabled = true;
      statusEl.textContent = "Cleared selection.";
    });

    accountBtn?.addEventListener("click", openAccountModal);
    accountBackdrop?.addEventListener("click", closeAccountModal);
    accountClose?.addEventListener("click", closeAccountModal);
    signUpBtn?.addEventListener("click", () => signUp().catch((e) => alert(e?.message || "Sign up failed.")));
    signInBtn?.addEventListener("click", () => signIn().catch((e) => alert(e?.message || "Sign in failed.")));
    signOutBtn?.addEventListener("click", () => signOut().catch((e) => alert(e?.message || "Sign out failed.")));

    updateAuthUi(null);
    initFirebase();
  </script>
</body>
</html>
