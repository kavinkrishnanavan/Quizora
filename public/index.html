<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-Wiz</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            color-scheme: light dark;

            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --status-bg: #eff6ff;
            --status-text: #2563eb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b1220;
                --card: #0f172a;
                --text: #e2e8f0;
                --muted: #94a3b8;
                --border: #263145;
                --shadow: 0 10px 18px -6px rgba(0, 0, 0, 0.55);
                --status-bg: rgba(37, 99, 235, 0.18);
                --status-text: #93c5fd;
            }
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; transition: background-color 0.2s ease, color 0.2s ease; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: var(--shadow); transition: background-color 0.2s ease, box-shadow 0.2s ease; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; }
        a { color: var(--primary); }
        hr { border-color: var(--border); }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: all 0.2s; background: transparent; color: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18); }
        
        button { background: var(--primary); color: white; padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #status { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; display: none; background: var(--status-bg); color: var(--status-text); border: 1px solid var(--border); }
        .quiz-card { background: var(--card); border: 1px solid var(--border); padding: 25px; margin-top: 25px; border-radius: 12px; border-left: 6px solid var(--primary); }
        pre { white-space: pre-wrap; font-family: inherit; font-size: 1rem; color: var(--text); }
        body {
            background: url("background.png");
        }
        .zoom {
  width: 200px;
  transition: transform 0.3s ease; /* smooth animation */
}

.zoom:hover {
  transform: scale(1.2); /* increases size by 20% */
}

        <button id="genBtn" onclick="run()">Generate Quizzes</button>

            <div role="dialog" aria-modal="true" aria-labelledby="csvModalTitle" style="position: relative; max-width: 1100px; margin: 6vh auto; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden;">

                        </div>
                    </div>

            </div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script>
    function sanitizeFilename(name) {
        return String(name || "Student")
            .trim()
            .replace(/[<>:"/\\|?*\x00-\x1F]/g, "_")
            .replace(/\s+/g, " ")
            .slice(0, 80);
    }

    function wrapLines(text, font, size, maxWidth) {
        const inputLines = String(text || "").replace(/\r\n/g, "\n").split("\n");
        const out = [];

        for (const rawLine of inputLines) {
            const words = rawLine.split(/\s+/).filter(Boolean);
            if (words.length === 0) {
                out.push("");
                continue;
            }

            let line = words[0];
            for (let i = 1; i < words.length; i++) {
                const candidate = line + " " + words[i];
                const width = font.widthOfTextAtSize(candidate, size);
                if (width <= maxWidth) {
                    line = candidate;
                } else {
                    out.push(line);
                    line = words[i];
                }
            }
            out.push(line);
        }

        return out;
    }

    async function buildWorksheetPdf({ quiz, meta, includeAnswers }) {
        const { PDFDocument, StandardFonts, rgb } = PDFLib;
        const answerFormat = meta?.answerFormat === "mcq" ? "mcq" : "blank";

        const doc = await PDFDocument.create();
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const fontBold = await doc.embedFont(StandardFonts.HelveticaBold);

        const margin = 48;
        const headerText = "Quiz-Wiz : Worksheets Empowered";
        const dateStr = new Date().toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });

        const form = doc.getForm();
        const sheetTitle = includeAnswers ? "Teacher Answer Sheet" : "Student Question Sheet";

        const startPage = ({ withMarks }) => {
            const page = doc.addPage();
            const { width, height } = page.getSize();
            const maxWidth = width - margin * 2;
            let y = height - margin;

            page.drawText(headerText, { x: margin, y, size: 14, font: fontBold, color: rgb(0.12, 0.2, 0.35) });
            y -= 18;
            page.drawText(`Generated: ${dateStr}`, { x: margin, y, size: 10, font, color: rgb(0.35, 0.45, 0.55) });
            y -= 18;

            page.drawText(`Student: ${quiz.studentName}`, { x: margin, y, size: 12, font: fontBold });
            y -= 18;

            if (withMarks) {
                page.drawText("Marks:", { x: margin, y, size: 11, font: fontBold });
                const marksField = form.createTextField(`marks_${Math.random().toString(16).slice(2)}`);
                marksField.setText("");
                marksField.addToPage(page, { x: margin + 52, y: y - 2, width: 120, height: 16 });
                page.drawText(`/ ${meta.maxMarks}`, { x: margin + 180, y, size: 11, font });
                y -= 24;
            } else {
                y -= 6;
            }

            page.drawText(`${meta.subject} | ${meta.topic} | ${meta.grade} | ${meta.curriculum}`, {
                x: margin,
                y,
                size: 10,
                font,
                color: rgb(0.35, 0.45, 0.55),
            });
            y -= 24;

            page.drawText(sheetTitle, { x: margin, y, size: 12, font: fontBold });
            y -= 18;

            return { page, y, maxWidth };
        };

        // Marks box should only be on the student-facing question sheet.
        let { page, y, maxWidth } = startPage({ withMarks: !includeAnswers });

        const qFontSize = 11;
        const aFontSize = 10;
        const qLineGap = 14;
        const aLineGap = 12;
        const minY = margin + 54;

        const ensureSpace = (needed) => {
            if (y - needed < minY) {
                ({ page, y, maxWidth } = startPage({ withMarks: false }));
            }
        };

        for (const q of quiz.questions) {
            const qText = `${q.number}. ${q.question}`;
            const qLines = wrapLines(qText, font, qFontSize, maxWidth);

            ensureSpace(qLines.length * qLineGap + 18);
            for (const line of qLines) {
                page.drawText(line, { x: margin, y, size: qFontSize, font });
                y -= qLineGap;
            }

            if (includeAnswers) {
                const extra =
                    answerFormat === "mcq" && typeof q.correctOption === "string"
                        ? `Correct option: ${q.correctOption}`
                        : "";
                const aText = extra ? `${extra}\nAnswer: ${q.answer}` : `Answer: ${q.answer}`;
                const aLines = wrapLines(aText, font, aFontSize, maxWidth - 18);
                ensureSpace(aLines.length * aLineGap + 12);
                for (const line of aLines) {
                    page.drawText(line, { x: margin + 18, y, size: aFontSize, font, color: rgb(0.15, 0.3, 0.2) });
                    y -= aLineGap;
                }
            } else {
                if (answerFormat === "mcq" && Array.isArray(q.options) && q.options.length) {
                    const labels = ["A", "B", "C", "D", "E", "F"];
                    const optFontSize = 10;
                    const optLineGap = 12;

                    const optLines = [];
                    for (let idx = 0; idx < q.options.length; idx++) {
                        const label = labels[idx] || String(idx + 1);
                        const txt = `${label}) ${q.options[idx]}`;
                        optLines.push(...wrapLines(txt, font, optFontSize, maxWidth - 18));
                    }

                    ensureSpace(optLines.length * optLineGap + 10);
                    for (const line of optLines) {
                        page.drawText(line, { x: margin + 18, y, size: optFontSize, font, color: rgb(0.2, 0.25, 0.32) });
                        y -= optLineGap;
                    }
                } else {
                    // Space for student work when printed.
                    ensureSpace(46);
                    for (let i = 0; i < 3; i++) {
                        page.drawLine({
                            start: { x: margin, y: y - 2 },
                            end: { x: margin + maxWidth, y: y - 2 },
                            thickness: 1,
                            color: rgb(0.86, 0.89, 0.92),
                        });
                        y -= 14;
                    }
                }
            }

            y -= 10;
        }

        form.updateFieldAppearances(font);
        return await doc.save();
    }

    async function downloadPdf(bytes, filename) {
        const blob = new Blob([bytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }

    async function readTextSmart(file) {
        const buf = await file.arrayBuffer();
        const bytes = new Uint8Array(buf);

        const hasUtf8Bom = bytes.length >= 3 && bytes[0] === 0xef && bytes[1] === 0xbb && bytes[2] === 0xbf;
        const hasUtf16leBom = bytes.length >= 2 && bytes[0] === 0xff && bytes[1] === 0xfe;
        const hasUtf16beBom = bytes.length >= 2 && bytes[0] === 0xfe && bytes[1] === 0xff;

        const nulCount = bytes.reduce((n, b) => n + (b === 0 ? 1 : 0), 0);
        const nulRatio = bytes.length ? nulCount / bytes.length : 0;

        let encoding = "utf-8";
        if (hasUtf16leBom) encoding = "utf-16le";
        else if (hasUtf16beBom) encoding = "utf-16be";
        else if (hasUtf8Bom) encoding = "utf-8";
        else if (nulRatio > 0.2) encoding = "utf-16le";

        try {
            return new TextDecoder(encoding).decode(bytes);
        } catch (_) {
            return new TextDecoder("utf-8").decode(bytes);
        }
    }

    function guessDelimiter(text) {
        const sample = text.slice(0, 4096);
        const counts = {
            ",": (sample.match(/,/g) || []).length,
            ";": (sample.match(/;/g) || []).length,
            "\t": (sample.match(/\t/g) || []).length,
        };
        const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
        return best && best[1] > 0 ? best[0] : ",";
    }

    function parseDelimited(text, delimiter) {
        const rows = [];
        let row = [];
        let field = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];

            if (ch === '"') {
                if (inQuotes && text[i + 1] === '"') {
                    field += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
                continue;
            }

            if (!inQuotes && ch === delimiter) {
                row.push(field);
                field = "";
                continue;
            }

            if (!inQuotes && (ch === "\n" || ch === "\r")) {
                row.push(field);
                field = "";
                rows.push(row);
                row = [];
                if (ch === "\r" && text[i + 1] === "\n") i++;
                continue;
            }

            field += ch;
        }

        row.push(field);
        rows.push(row);

        while (rows.length && rows[rows.length - 1].every((c) => String(c ?? "").trim() === "")) {
            rows.pop();
        }

        return rows;
    }

    function rowsToObjects(rows) {
        if (!rows.length) return { headers: [], records: [] };

        const rawHeaders = rows[0].map((h) => String(h ?? "").replace(/^\uFEFF/, "").trim());
        const headers = rawHeaders.map((h, idx) => (h ? h : `Column${idx + 1}`));

        const records = [];
        for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            if (!r || r.every((c) => String(c ?? "").trim() === "")) continue;
            const obj = {};
            for (let j = 0; j < headers.length; j++) obj[headers[j]] = String(r[j] ?? "").trim();
            records.push(obj);
        }
        return { headers, records };
    }

    let csvState = null;

    function fileKey(file) {
        return file ? `${file.name}|${file.size}|${file.lastModified}` : "";
    }

    function escapeHtml(s) {
        return String(s ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function guessMarksHeader(headers) {
        const re = /(mark|marks|score|points|total|result|grade)/i;
        const hit = headers.find((h) => re.test(String(h)));
        return hit || headers[1] || headers[0] || "";
    }

    function closeCsvModal() {
        const modal = document.getElementById("csvModal");
        if (modal) modal.style.display = "none";
        document.body.style.overflow = "";
    }

    function openCsvModal(state) {
        const modal = document.getElementById("csvModal");
        const subtitle = document.getElementById("csvModalSubtitle");
        const select = document.getElementById("marksColumnSelect");
        const table = document.getElementById("csvPreviewTable");

        if (!modal || !select || !table) return;

        if (subtitle) {
            subtitle.textContent = `${state.fileName} • ${state.records.length} student rows`;
        }

        select.innerHTML = "";
        for (const h of state.headers) {
            const opt = document.createElement("option");
            opt.value = h;
            opt.textContent = h;
            select.appendChild(opt);
        }

        const defaultHeader = state.marksColumn || guessMarksHeader(state.headers);
        if (defaultHeader) select.value = defaultHeader;

        const previewRows = state.previewRows || [];
        const cols = Math.min(state.headers.length || 0, 12) || Math.min((previewRows[0] || []).length || 0, 12) || 8;

        const headCells = [];
        for (let i = 0; i < Math.min(state.headers.length, cols); i++) {
            headCells.push(`<th style="text-align:left; padding: 10px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card);">${escapeHtml(state.headers[i])}</th>`);
        }

        const bodyRows = previewRows.slice(1, 11).map((r) => {
            const tds = [];
            for (let i = 0; i < cols; i++) {
                tds.push(`<td style="padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top;">${escapeHtml(r?.[i] ?? "")}</td>`);
            }
            return `<tr>${tds.join("")}</tr>`;
        });

        table.innerHTML = `<thead><tr>${headCells.join("")}</tr></thead><tbody>${bodyRows.join("")}</tbody>`;

        modal.style.display = "block";
        document.body.style.overflow = "hidden";
    }

    async function parseCsvToState(file) {
        const text = await readTextSmart(file);
        const delimiter = guessDelimiter(text);
        const parsedRows = parseDelimited(text, delimiter);
        const { headers, records } = rowsToObjects(parsedRows);

        return {
            key: fileKey(file),
            fileName: file?.name || "CSV",
            headers,
            records,
            previewRows: parsedRows.slice(0, 11),
            marksColumn: "",
        };
    }

    function ensureCsvStateMatchesFile(file) {
        const key = fileKey(file);
        if (!csvState || csvState.key !== key) return false;
        return true;
    }

    (function initCsvModal() {
        const fileInput = document.getElementById("csvFile");
        const closeBtn = document.getElementById("csvModalClose");
        const useBtn = document.getElementById("csvModalUse");
        const backdrop = document.getElementById("csvModalBackdrop");

        const close = () => closeCsvModal();
        if (closeBtn) closeBtn.addEventListener("click", close);
        if (backdrop) backdrop.addEventListener("click", close);

        if (useBtn) {
            useBtn.addEventListener("click", () => {
                if (!csvState) return closeCsvModal();
                const select = document.getElementById("marksColumnSelect");
                const chosen = select ? String(select.value || "") : "";
                if (!chosen) return;
                csvState.marksColumn = chosen;
                const mCol = document.getElementById("mCol");
                if (mCol) mCol.value = chosen;
                closeCsvModal();
            });
        }

        if (fileInput) {
            fileInput.addEventListener("change", async () => {
                const file = fileInput.files?.[0];
                if (!file) return;
                try {
                    closeCsvModal();
                    csvState = null;
                    const mCol = document.getElementById("mCol");
                    if (mCol) mCol.value = "";
                    csvState = await parseCsvToState(file);
                    openCsvModal(csvState);
                } catch (e) {
                    alert("Could not read this CSV. Please re-export as CSV UTF-8.\n\n" + (e?.message || String(e)));
                }
            });
        }
    })();

    async function run() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert("Please upload a CSV file.");

        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        btn.disabled = true;
        status.style.display = "block";
        output.innerHTML = "";

        try {
            if (!ensureCsvStateMatchesFile(file)) {
                csvState = await parseCsvToState(file);
                openCsvModal(csvState);
                status.innerText = "Select the marks column, then click “Use This Column”.";
                return;
            }

            if (!csvState.records.length) throw new Error("No data rows found in the CSV.");
            if (!csvState.marksColumn) {
                openCsvModal(csvState);
                status.innerText = "Select the marks column, then click “Use This Column”.";
                return;
            }

            const records = csvState.records;
            const marksColumn = csvState.marksColumn;

            for (let i = 0; i < records.length; i++) {
                status.innerText = `Generating quiz ${i + 1} of ${records.length}...`;
                
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rowObject: records[i],
                        marksColumn,
                        score: records[i]?.[marksColumn] ?? "",
                        subject: document.getElementById('subject').value,
                        topic: document.getElementById('topic').value,
                        grade: document.getElementById('grade').value,
                        curriculum: document.getElementById('curriculum').value,
                        maxMarks: document.getElementById('mMax').value,
                        questionCount: parseInt(document.getElementById('qCount').value, 10),
                        answerFormat: document.getElementById('answerFormat').value,
                        requests: document.getElementById('requests').value
                    })
                });

                let data = null;
                try {
                    data = await response.json();
                } catch (_) {
                    data = null;
                }

                if (!response.ok) {
                    const errMsg = data?.error ? String(data.error) : `Request failed (${response.status})`;
                    const errRid = data?.requestId ? `\nRequest ID: ${data.requestId}` : "";
                    throw new Error(errMsg + errRid);
                }
                
                const quiz = data?.quiz;
                if (!quiz || typeof quiz.studentName !== "string" || !Array.isArray(quiz.questions)) {
                    throw new Error("Server returned an unexpected quiz format.");
                }

                const meta = {
                    subject: document.getElementById('subject').value,
                    topic: document.getElementById('topic').value,
                    grade: document.getElementById('grade').value,
                    curriculum: document.getElementById('curriculum').value,
                    maxMarks: document.getElementById('mMax').value,
                    answerFormat: document.getElementById('answerFormat').value
                };

                const card = document.createElement('div');
                card.className = 'quiz-card';

                const title = document.createElement('div');
                title.style.fontWeight = "800";
                title.style.marginBottom = "10px";
                title.innerText = quiz.studentName;

                const btnRow = document.createElement('div');
                btnRow.style.display = "flex";
                btnRow.style.gap = "10px";
                btnRow.style.flexWrap = "wrap";
                btnRow.style.marginBottom = "12px";

                const qBtn = document.createElement('button');
                qBtn.type = "button";
                qBtn.innerText = "Download Question PDF";
                qBtn.style.padding = "10px 12px";
                qBtn.style.marginTop = "0";

                const aBtn = document.createElement('button');
                aBtn.type = "button";
                aBtn.innerText = "Download Answer PDF";
                aBtn.style.padding = "10px 12px";
                aBtn.style.marginTop = "0";

                qBtn.onclick = async () => {
                    qBtn.disabled = true;
                    try {
                        const bytes = await buildWorksheetPdf({ quiz, meta, includeAnswers: false });
                        await downloadPdf(bytes, `${sanitizeFilename(quiz.studentName)} - Question Sheet.pdf`);
                    } finally {
                        qBtn.disabled = false;
                    }
                };

                aBtn.onclick = async () => {
                    aBtn.disabled = true;
                    try {
                        const bytes = await buildWorksheetPdf({ quiz, meta, includeAnswers: true });
                        await downloadPdf(bytes, `${sanitizeFilename(quiz.studentName)} - Answer Sheet.pdf`);
                    } finally {
                        aBtn.disabled = false;
                    }
                };

                btnRow.appendChild(qBtn);
                btnRow.appendChild(aBtn);

                const preview = document.createElement('pre');
                preview.innerText = quiz.questions.map(q => `${q.number}. ${q.question}`).join("\n\n");

                card.appendChild(title);
                card.appendChild(btnRow);
                card.appendChild(preview);
                output.appendChild(card);
            }
            status.innerText = "✅ All quizzes generated successfully!";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
