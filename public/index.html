<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Master | Professional Edition</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #1e293b; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #64748b; }
        input, select, textarea { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: all 0.2s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { background: var(--primary); color: white; padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #status { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; display: none; background: #eff6ff; color: var(--primary); }
        .quiz-card { background: white; border: 1px solid #e2e8f0; padding: 25px; margin-top: 25px; border-radius: 12px; border-left: 6px solid var(--primary); }
        pre { white-space: pre-wrap; font-family: inherit; font-size: 1rem; color: #334155; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 AI Quiz Master</h2>
    
    <div class="form-grid">
        <div class="field">
            <label>Subject</label>
            <input id="subject" value="Mathematics">
        </div>
        <div class="field">
            <label>Topic</label>
            <input id="topic" value="Linear Equations">
        </div>
        <div class="field">
            <label>Grade Level</label>
            <select id="grade">
                <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
                <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
                <option>Grade 7</option><option>Grade 8</option><option selected>Grade 9</option>
                <option>Grade 10</option><option>Grade 11</option><option>Grade 12</option>
            </select>
        </div>
        <div class="field">
            <label>Curriculum</label>
            <select id="curriculum">
                <option>KSSR</option><option selected>KSSM</option>
                <option>Cambridge IGCSE</option><option>IB</option><option>AP</option>
            </select>
        </div>
        <div class="field">
            <label>Score Column Number (1, 2...)</label>
            <input type="number" id="mCol" value="2">
        </div>
        <div class="field">
            <label>Marks Out Of (Total)</label>
            <input type="number" id="mMax" value="100">
        </div>
        <div class="field">
            <label>Questions per Student</label>
            <input type="number" id="qCount" value="3" min="1" max="50">
        </div>
        <div class="field full-width">
            <label>Upload Student Marks (CSV)</label>
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <div class="field full-width">
            <label>Special Requests (Optional)</label>
            <textarea id="requests" rows="2" placeholder="e.g. Include 1 word problem, funny tone..."></textarea>
        </div>
    </div>

    <button id="genBtn" onclick="run()">Generate Quizzes</button>
    <div id="status"></div>
    <div id="output"></div>
</div>

<script>
    async function run() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert("Please upload a CSV file.");

        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        btn.disabled = true;
        status.style.display = "block";
        output.innerHTML = "";

        try {
            const text = await file.text();
            const rows = text.split('\n').filter(r => r.trim() !== "");
            rows.shift(); // Remove header

            for (let i = 0; i < rows.length; i++) {
                status.innerText = `Generating quiz ${i + 1} of ${rows.length}...`;
                
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        row: rows[i],
                        subject: document.getElementById('subject').value,
                        topic: document.getElementById('topic').value,
                        grade: document.getElementById('grade').value,
                        curriculum: document.getElementById('curriculum').value,
                        maxMarks: document.getElementById('mMax').value,
                        questionCount: parseInt(document.getElementById('qCount').value, 10),
                        requests: document.getElementById('requests').value
                    })
                });

                let data = null;
                try {
                    data = await response.json();
                } catch (_) {
                    data = null;
                }

                if (!response.ok) {
                    const errMsg = data?.error ? String(data.error) : `Request failed (${response.status})`;
                    const errRid = data?.requestId ? `\nRequest ID: ${data.requestId}` : "";
                    throw new Error(errMsg + errRid);
                }
                
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.innerHTML = `<pre>${data.text || "Error processing this row."}</pre>`;
                output.appendChild(card);
            }
            status.innerText = "✅ All quizzes generated successfully!";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
