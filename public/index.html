        :root {
            color-scheme: light dark;

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; transition: background-color 0.2s ease, color 0.2s ease; }

        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; }
        a { color: var(--primary); }
        hr { border-color: var(--border); }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: all 0.2s; background: transparent; color: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18); }
        
        button { background: var(--primary); color: white; padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #status { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; display: none; background: var(--status-bg); color: var(--status-text); border: 1px solid var(--border); }
        .quiz-card { background: var(--card); border: 1px solid var(--border); padding: 25px; margin-top: 25px; border-radius: 12px; border-left: 6px solid var(--primary); }
        pre { white-space: pre-wrap; font-family: inherit; font-size: 1rem; color: var(--text); }
        body {
            background: url("background.png");
        }
        .zoom {
  width: 200px;
  transition: transform 0.3s ease; /* smooth animation */
}

.zoom:hover {
  transform: scale(1.2); /* increases size by 20% */
}

        #bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 0px;
    
    text-align: center;
}

        .csv-equal-table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 0.95rem;
        }

        .csv-equal-table th,
        .csv-equal-table td {
            padding: 10px 10px;
            border: 1px solid var(--border);
            vertical-align: top;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .csv-equal-table th {
            position: sticky;
            top: 0;
            background: var(--card);
            font-weight: 700;
            z-index: 1;
        }

        .csv-equal-table.is-selecting {
            user-select: none;
            cursor: cell;

        .csv-cell-selected {

        }

        .csv-col-name {
            outline: 2px solid rgba(16, 185, 129, 0.7);
            outline-offset: -2px;
        }

            outline: 2px solid rgba(245, 158, 11, 0.75);
            outline-offset: -2px;
        }

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script>
    function sanitizeFilename(name) {
        return String(name || "Student")
            .trim()
            .replace(/[<>:"/\\|?*\x00-\x1F]/g, "_")
            .replace(/\s+/g, " ")
            .slice(0, 80);
    }

    function wrapLines(text, font, size, maxWidth) {
        const inputLines = String(text || "").replace(/\r\n/g, "\n").split("\n");
        const out = [];

        for (const rawLine of inputLines) {
            const words = rawLine.split(/\s+/).filter(Boolean);
            if (words.length === 0) {
                out.push("");
                continue;
            }

            let line = words[0];
            for (let i = 1; i < words.length; i++) {
                const candidate = line + " " + words[i];
                const width = font.widthOfTextAtSize(candidate, size);
                if (width <= maxWidth) {
                    line = candidate;
                } else {
                    out.push(line);
                    line = words[i];
                }
            }
            out.push(line);
        }

        return out;
    }

    async function buildWorksheetPdf({ quiz, meta, includeAnswers }) {
        const { PDFDocument, StandardFonts, rgb } = PDFLib;
        const answerFormat = meta?.answerFormat === "mcq" ? "mcq" : "blank";

        const doc = await PDFDocument.create();
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const fontBold = await doc.embedFont(StandardFonts.HelveticaBold);

        const margin = 48;
        const headerText = "Quiz-Wiz : Worksheets Empowered";
        const dateStr = new Date().toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });

        const form = doc.getForm();
        const sheetTitle = includeAnswers ? "Teacher Answer Sheet" : "Student Question Sheet";

        const startPage = ({ withMarks }) => {
            const page = doc.addPage();
            const { width, height } = page.getSize();
            const maxWidth = width - margin * 2;
            let y = height - margin;

            page.drawText(headerText, { x: margin, y, size: 14, font: fontBold, color: rgb(0.12, 0.2, 0.35) });
            y -= 18;
            page.drawText(`Generated: ${dateStr}`, { x: margin, y, size: 10, font, color: rgb(0.35, 0.45, 0.55) });
            y -= 18;

            page.drawText(`Student: ${quiz.studentName}`, { x: margin, y, size: 12, font: fontBold });
            y -= 18;

            if (withMarks) {
                page.drawText("Marks:", { x: margin, y, size: 11, font: fontBold });
                const marksField = form.createTextField(`marks_${Math.random().toString(16).slice(2)}`);
                marksField.setText("");
                marksField.addToPage(page, { x: margin + 52, y: y - 2, width: 120, height: 16 });
                page.drawText(`/ ${meta.maxMarks}`, { x: margin + 180, y, size: 11, font });
                y -= 24;
            } else {
                y -= 6;
            }

            page.drawText(`${meta.subject} | ${meta.topic} | ${meta.grade} | ${meta.curriculum}`, {
                x: margin,
                y,
                size: 10,
                font,
                color: rgb(0.35, 0.45, 0.55),
            });
            y -= 24;

            page.drawText(sheetTitle, { x: margin, y, size: 12, font: fontBold });
            y -= 18;

            return { page, y, maxWidth };
        };

        // Marks box should only be on the student-facing question sheet.
        let { page, y, maxWidth } = startPage({ withMarks: !includeAnswers });

        const qFontSize = 11;
        const aFontSize = 10;
        const qLineGap = 14;
        const aLineGap = 12;
        const minY = margin + 54;

        const ensureSpace = (needed) => {
            if (y - needed < minY) {
                ({ page, y, maxWidth } = startPage({ withMarks: false }));
            }
        };

        for (const q of quiz.questions) {
            const qText = `${q.number}. ${q.question}`;
            const qLines = wrapLines(qText, font, qFontSize, maxWidth);

            ensureSpace(qLines.length * qLineGap + 18);
            for (const line of qLines) {
                page.drawText(line, { x: margin, y, size: qFontSize, font });
                y -= qLineGap;
            }

            if (includeAnswers) {
                const extra =
                    answerFormat === "mcq" && typeof q.correctOption === "string"
                        ? `Correct option: ${q.correctOption}`
                        : "";
                const aText = extra ? `${extra}\nAnswer: ${q.answer}` : `Answer: ${q.answer}`;
                const aLines = wrapLines(aText, font, aFontSize, maxWidth - 18);
                ensureSpace(aLines.length * aLineGap + 12);
                for (const line of aLines) {
                    page.drawText(line, { x: margin + 18, y, size: aFontSize, font, color: rgb(0.15, 0.3, 0.2) });
                    y -= aLineGap;
                }
            } else {
                if (answerFormat === "mcq" && Array.isArray(q.options) && q.options.length) {
                    const labels = ["A", "B", "C", "D", "E", "F"];
                    const optFontSize = 10;
                    const optLineGap = 12;

                    const optLines = [];
                    for (let idx = 0; idx < q.options.length; idx++) {
                        const label = labels[idx] || String(idx + 1);
                        const txt = `${label}) ${q.options[idx]}`;
                        optLines.push(...wrapLines(txt, font, optFontSize, maxWidth - 18));
                    }

                    ensureSpace(optLines.length * optLineGap + 10);
                    for (const line of optLines) {
                        page.drawText(line, { x: margin + 18, y, size: optFontSize, font, color: rgb(0.2, 0.25, 0.32) });
                        y -= optLineGap;
                    }
                } else {
                    // Space for student work when printed.
                    ensureSpace(46);
                    for (let i = 0; i < 3; i++) {
                        page.drawLine({
                            start: { x: margin, y: y - 2 },
                            end: { x: margin + maxWidth, y: y - 2 },
                            thickness: 1,
                            color: rgb(0.86, 0.89, 0.92),
                        });
                        y -= 14;
                    }
                }
            }

            y -= 10;
        }

        form.updateFieldAppearances(font);
        return await doc.save();
    }

    async function downloadPdf(bytes, filename) {
        const blob = new Blob([bytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }

    async function readTextSmart(file) {
        const buf = await file.arrayBuffer();
        const bytes = new Uint8Array(buf);

        const hasUtf8Bom = bytes.length >= 3 && bytes[0] === 0xef && bytes[1] === 0xbb && bytes[2] === 0xbf;
        const hasUtf16leBom = bytes.length >= 2 && bytes[0] === 0xff && bytes[1] === 0xfe;
        const hasUtf16beBom = bytes.length >= 2 && bytes[0] === 0xfe && bytes[1] === 0xff;

        const nulCount = bytes.reduce((n, b) => n + (b === 0 ? 1 : 0), 0);
        const nulRatio = bytes.length ? nulCount / bytes.length : 0;

        let encoding = "utf-8";
        if (hasUtf16leBom) encoding = "utf-16le";
        else if (hasUtf16beBom) encoding = "utf-16be";
        else if (hasUtf8Bom) encoding = "utf-8";
        else if (nulRatio > 0.2) encoding = "utf-16le";

        try {
            return new TextDecoder(encoding).decode(bytes);
        } catch (_) {
            return new TextDecoder("utf-8").decode(bytes);
        }
    }

    function guessDelimiter(text) {
        const sample = text.slice(0, 4096);
        const counts = {
            ",": (sample.match(/,/g) || []).length,
            ";": (sample.match(/;/g) || []).length,
            "\t": (sample.match(/\t/g) || []).length,
        };
        const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
        return best && best[1] > 0 ? best[0] : ",";
    }

    function parseDelimited(text, delimiter) {
        const rows = [];
        let row = [];
        let field = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];

            if (ch === '"') {
                if (inQuotes && text[i + 1] === '"') {
                    field += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
                continue;
            }

            if (!inQuotes && ch === delimiter) {
                row.push(field);
                field = "";
                continue;
            }

            if (!inQuotes && (ch === "\n" || ch === "\r")) {
                row.push(field);
                field = "";
                rows.push(row);
                row = [];
                if (ch === "\r" && text[i + 1] === "\n") i++;
                continue;
            }

            field += ch;
        }

        row.push(field);
        rows.push(row);

        while (rows.length && rows[rows.length - 1].every((c) => String(c ?? "").trim() === "")) {
            rows.pop();
        }

        return rows;
    }

    function rowsToObjects(rows) {
        if (!rows.length) return { headers: [], records: [] };

        const rawHeaders = rows[0].map((h) => String(h ?? "").replace(/^\uFEFF/, "").trim());
        const headers = rawHeaders.map((h, idx) => (h ? h : `Column${idx + 1}`));

        const records = [];
        for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            if (!r || r.every((c) => String(c ?? "").trim() === "")) continue;
            const obj = {};
            for (let j = 0; j < headers.length; j++) obj[headers[j]] = String(r[j] ?? "").trim();
            records.push(obj);
        }
        return { headers, records };
    }

    let csvState = null;

    function fileKey(file) {
        return file ? `${file.name}|${file.size}|${file.lastModified}` : "";
    }

    function escapeHtml(s) {
        return String(s ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function guessMarksHeader(headers) {
        const re = /(mark|marks|score|points|total|result|grade)/i;
        const hit = headers.find((h) => re.test(String(h)));
        return hit || headers[1] || headers[0] || "";
    }

    function guessNameHeader(headers) {
        const re = /(name|student|learner|candidate)/i;
        const hit = headers.find((h) => re.test(String(h)));
        return hit || "";
    }

    let csvSelection = null;

    function buildCsvPreviewTable(table, headers, previewRows) {
        table.textContent = "";

        const cols = Math.max(1, headers?.length || 0);
        const colWidth = 160;

        const colgroup = document.createElement("colgroup");
        for (let c = 0; c < cols; c++) {
            const col = document.createElement("col");
            col.style.width = `${colWidth}px`;
            colgroup.appendChild(col);
        }
        table.appendChild(colgroup);

        const thead = document.createElement("thead");
        const trHead = document.createElement("tr");
        for (let c = 0; c < cols; c++) {
            const th = document.createElement("th");
            th.textContent = String(headers?.[c] ?? `Column${c + 1}`);
            th.dataset.r = "-1";
            th.dataset.c = String(c);
            trHead.appendChild(th);
        }
        thead.appendChild(trHead);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        const rows = Array.isArray(previewRows) ? previewRows.slice(0, 10) : [];
        for (let r = 0; r < rows.length; r++) {
            const tr = document.createElement("tr");
            for (let c = 0; c < cols; c++) {
                const td = document.createElement("td");
                td.textContent = String(rows?.[r]?.[c] ?? "");
                td.dataset.r = String(r);
                td.dataset.c = String(c);
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
        table.appendChild(tbody);
    }

    function applyCsvSelectionHighlight(table) {
        const cells = table.querySelectorAll("th[data-r][data-c], td[data-r][data-c]");
        if (!csvSelection?.start || !csvSelection?.end) {
            cells.forEach((el) => el.classList.remove("csv-cell-selected"));
            return;
        }

        const r1 = Number(csvSelection.start.r);
        const r2 = Number(csvSelection.end.r);
        const c1 = Number(csvSelection.start.c);
        const c2 = Number(csvSelection.end.c);

        const rMin = Math.min(r1, r2);
        const rMax = Math.max(r1, r2);
        const cMin = Math.min(c1, c2);
        const cMax = Math.max(c1, c2);

        cells.forEach((el) => {
            const r = Number(el.dataset.r);
            const c = Number(el.dataset.c);
            const inside = r >= rMin && r <= rMax && c >= cMin && c <= cMax;
            el.classList.toggle("csv-cell-selected", inside);
        });
    }

    function getCsvSelectedColumnRange() {
        if (!csvSelection?.start || !csvSelection?.end) return null;
        const c1 = Number(csvSelection.start.c);
        const c2 = Number(csvSelection.end.c);
        if (!Number.isFinite(c1) || !Number.isFinite(c2)) return null;
        return { cMin: Math.min(c1, c2), cMax: Math.max(c1, c2) };
    }

    function applyChosenColumnClasses(table, headers, nameColumn, marksColumn) {
        const nameIndex = nameColumn ? headers.indexOf(nameColumn) : -1;
        const marksIndex = marksColumn ? headers.indexOf(marksColumn) : -1;
        const cells = table.querySelectorAll("th[data-r][data-c], td[data-r][data-c]");

        cells.forEach((el) => {
            el.classList.remove("csv-col-name", "csv-col-marks");
            const c = Number(el.dataset.c);
            if (Number.isFinite(c) && c === nameIndex) el.classList.add("csv-col-name");
            if (Number.isFinite(c) && c === marksIndex) el.classList.add("csv-col-marks");
        });
    }

    function initCsvDragSelection(table) {
        if (table.dataset.dragSelectInit) return;
        table.dataset.dragSelectInit = "1";

        const getCellFromEvent = (ev) => {
            let cell = ev.target?.closest?.("td,th") || null;
            if (!cell && typeof document.elementFromPoint === "function") {
                const el = document.elementFromPoint(ev.clientX, ev.clientY);
                cell = el?.closest?.("td,th") || null;
            }
            return cell;
        };

        const startSelection = (cell) => {
            csvSelection = {
                start: { r: Number(cell.dataset.r), c: Number(cell.dataset.c) },
                end: { r: Number(cell.dataset.r), c: Number(cell.dataset.c) },
            };
            applyCsvSelectionHighlight(table);
        };

        table.addEventListener("pointerdown", (ev) => {
            if (ev.button !== 0) return;
            const cell = getCellFromEvent(ev);
            if (!cell || !cell.dataset) return;

            table.classList.add("is-selecting");
            try {
                table.setPointerCapture(ev.pointerId);
            } catch (_) {}

            startSelection(cell);
            ev.preventDefault();
        });

        table.addEventListener("pointermove", (ev) => {
            if (!table.classList.contains("is-selecting")) return;
            const cell = getCellFromEvent(ev);
            if (!cell || !cell.dataset || !csvSelection) return;

            csvSelection.end = { r: Number(cell.dataset.r), c: Number(cell.dataset.c) };
            applyCsvSelectionHighlight(table);
        });

        const end = (ev) => {
            if (!table.classList.contains("is-selecting")) return;
            table.classList.remove("is-selecting");
            try {
                table.releasePointerCapture(ev.pointerId);
            } catch (_) {}
        };

        table.addEventListener("pointerup", end);
        table.addEventListener("pointercancel", end);
        table.addEventListener("pointerleave", (ev) => {
            if (!table.classList.contains("is-selecting")) return;
            end(ev);
        });
    }

    function closeCsvModal() {
        const modal = document.getElementById("csvModal");
        if (modal) modal.style.display = "none";
        document.body.style.overflow = "";
    }

    function openCsvModal(state) {
        const modal = document.getElementById("csvModal");
        const subtitle = document.getElementById("csvModalSubtitle");
        const nameSelect = document.getElementById("nameColumnSelect");
        const marksSelect = document.getElementById("marksColumnSelect");
        const table = document.getElementById("csvPreviewTable");

        if (!modal || !marksSelect || !nameSelect || !table) return;
        csvSelection = null;

        if (subtitle) {
            subtitle.textContent = `${state.fileName} • ${state.records.length} student rows • Drag to select cells like Excel`;
        }

        nameSelect.innerHTML = "";
        {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "(Auto-detect)";
            nameSelect.appendChild(opt);
        }

        marksSelect.innerHTML = "";
        for (const h of state.headers) {
            const optName = document.createElement("option");
            optName.value = h;
            optName.textContent = h;
            nameSelect.appendChild(optName);

            const optMarks = document.createElement("option");
            optMarks.value = h;
            optMarks.textContent = h;
            marksSelect.appendChild(optMarks);
        }

        const defaultNameHeader = state.nameColumn || guessNameHeader(state.headers) || "";
        nameSelect.value = defaultNameHeader;

        const defaultMarksHeader = state.marksColumn || guessMarksHeader(state.headers);
        if (defaultMarksHeader) marksSelect.value = defaultMarksHeader;

        buildCsvPreviewTable(table, state.headers, state.previewRows);
        initCsvDragSelection(table);
        applyCsvSelectionHighlight(table);
        applyChosenColumnClasses(table, state.headers, nameSelect.value, marksSelect.value);

        modal.style.display = "block";
        document.body.style.overflow = "hidden";
    }

    async function parseCsvToState(file) {
        const text = await readTextSmart(file);
        const delimiter = guessDelimiter(text);
        const parsedRows = parseDelimited(text, delimiter);
        const { headers, records } = rowsToObjects(parsedRows);

        return {
            key: fileKey(file),
            fileName: file?.name || "CSV",
            headers,
            records,
            previewRows: parsedRows.slice(1, 11),
            marksColumn: "",
            nameColumn: "",
        };
    }

    function ensureCsvStateMatchesFile(file) {
        const key = fileKey(file);
        if (!csvState || csvState.key !== key) return false;
        return true;
    }

    (function initCsvModal() {
        const fileInput = document.getElementById("csvFile");
        const closeBtn = document.getElementById("csvModalClose");
        const useBtn = document.getElementById("csvModalUse");
        const setNameBtn = document.getElementById("csvSetNameFromSelection");
        const setMarksBtn = document.getElementById("csvSetMarksFromSelection");
        const backdrop = document.getElementById("csvModalBackdrop");

        const close = () => closeCsvModal();
        if (closeBtn) closeBtn.addEventListener("click", close);
        if (backdrop) backdrop.addEventListener("click", close);

        const refreshChosen = () => {
            if (!csvState) return;
            const table = document.getElementById("csvPreviewTable");
            const nameSelect = document.getElementById("nameColumnSelect");
            const marksSelect = document.getElementById("marksColumnSelect");
            if (!table || !nameSelect || !marksSelect) return;
            applyChosenColumnClasses(
                table,
                csvState.headers || [],
                String(nameSelect.value || ""),
                String(marksSelect.value || "")
            );
        };

        const setFromSelection = ({ which }) => {
            if (!csvState) return;
            const range = getCsvSelectedColumnRange();
            if (!range) return;

            const headers = csvState.headers || [];
            const idx = which === "marks" ? range.cMax : range.cMin;
            const header = headers[idx] || "";

            if (which === "marks") {
                const marksSelect = document.getElementById("marksColumnSelect");
                if (marksSelect && header) marksSelect.value = header;
            } else {
                const nameSelect = document.getElementById("nameColumnSelect");
                if (nameSelect) nameSelect.value = header;
            }

            refreshChosen();
        };

        if (setNameBtn) setNameBtn.addEventListener("click", () => setFromSelection({ which: "name" }));
        if (setMarksBtn) setMarksBtn.addEventListener("click", () => setFromSelection({ which: "marks" }));

        const nameSelectEl = document.getElementById("nameColumnSelect");
        const marksSelectEl = document.getElementById("marksColumnSelect");
        if (nameSelectEl) nameSelectEl.addEventListener("change", refreshChosen);
        if (marksSelectEl) marksSelectEl.addEventListener("change", refreshChosen);

        if (useBtn) {
            useBtn.addEventListener("click", () => {
                if (!csvState) return closeCsvModal();
                const marksSelect = document.getElementById("marksColumnSelect");
                const nameSelect = document.getElementById("nameColumnSelect");
                const chosenMarks = marksSelect ? String(marksSelect.value || "") : "";
                const chosenName = nameSelect ? String(nameSelect.value || "") : "";
                if (!chosenMarks) return;

                csvState.marksColumn = chosenMarks;
                csvState.nameColumn = chosenName;
                const mCol = document.getElementById("mCol");
                if (mCol) mCol.value = chosenMarks;
                const nCol = document.getElementById("nCol");
                if (nCol) nCol.value = chosenName;
                closeCsvModal();
            });
        }

        if (fileInput) {
            fileInput.addEventListener("change", async () => {
                const file = fileInput.files?.[0];
                if (!file) return;
                try {
                    closeCsvModal();
                    csvState = null;
                    const mCol = document.getElementById("mCol");
                    if (mCol) mCol.value = "";
                    const nCol = document.getElementById("nCol");
                    if (nCol) nCol.value = "";
                    csvSelection = null;
                    csvState = await parseCsvToState(file);
                    openCsvModal(csvState);
                } catch (e) {
                    alert("Could not read this CSV. Please re-export as CSV UTF-8.\n\n" + (e?.message || String(e)));
                }
            });
        }
    })();

    function buildRowTextForAi(rowObject, marksColumn, nameColumn) {
        if (!rowObject || typeof rowObject !== "object" || Array.isArray(rowObject)) return "";

        const keys = Object.keys(rowObject);
        const nameKeys = keys.filter((k) => /(name|student|learner|candidate)/i.test(k));
        const idKeys = keys.filter((k) => /(id|adm|admission|roll|index)/i.test(k));
        const selected = [];

        const addKey = (k) => {
            if (!k) return;
            if (selected.includes(k)) return;
            selected.push(k);
        };

        addKey(nameColumn);
        for (const k of nameKeys.slice(0, 2)) addKey(k);
        for (const k of idKeys.slice(0, 1)) addKey(k);
        addKey(marksColumn);

        if (selected.length === 0) {
            for (const k of keys.slice(0, 6)) addKey(k);
        }

        const lines = [];
        for (const k of selected) {
            const raw = String(rowObject[k] ?? "");
            const v = raw.trim().slice(0, 300);
            if (!v) continue;
            lines.push(`${k}: ${v}${raw.trim().length > 300 ? " (truncated)" : ""}`);
        }

        return lines.join("\n");
    }

    function buildRowTextAllColumns(rowObject) {
        if (!rowObject || typeof rowObject !== "object" || Array.isArray(rowObject)) return "";

        const keys = Object.keys(rowObject);
        const lines = [];
        let used = 0;

        for (const k of keys) {
            const raw = String(rowObject[k] ?? "");
            const v = raw.trim().slice(0, 400);
            if (!v) continue;
            const line = `${k}: ${v}${raw.trim().length > 400 ? " (truncated)" : ""}`;
            lines.push(line);
            used += line.length + 1;
            if (lines.length >= 60) break;
            if (used >= 9000) break;
        }

        return lines.join("\n");
    }

    function shouldSendTxtToAi(rowObject) {
        if (!rowObject || typeof rowObject !== "object" || Array.isArray(rowObject)) return true;

        const keys = Object.keys(rowObject);
        if (keys.length > 30) return true;

        let totalLen = 0;
        for (const k of keys) totalLen += String(rowObject[k] ?? "").length;
        if (totalLen > 5000) return true;

        // Heuristic: if there's a lot of non-printable characters, treat as "confusing" data.
        const sample = keys.slice(0, 10).map((k) => String(rowObject[k] ?? "")).join("\n").slice(0, 1000);
        const nonPrintable = (sample.match(/[^\x09\x0A\x0D\x20-\x7E]/g) || []).length;
        if (sample.length && nonPrintable / sample.length > 0.2) return true;

        return false;
    }

    async function requestQuiz(payload) {
        const response = await fetch('/.netlify/functions/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        let data = null;
        try {
            data = await response.json();
        } catch (_) {
            data = null;
        }

        if (!response.ok) {
            const errMsg = data?.error ? String(data.error) : `Request failed (${response.status})`;
            const errRid = data?.requestId ? `\nRequest ID: ${data.requestId}` : "";
            throw new Error(errMsg + errRid);
        }

        const quiz = data?.quiz;
        if (!quiz || typeof quiz.studentName !== "string" || !Array.isArray(quiz.questions)) {
            throw new Error("Server returned an unexpected quiz format.");
        }
        return quiz;
    }

    async function run() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert("Please upload a CSV file.");

        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        btn.disabled = true;
        status.style.display = "block";
        output.innerHTML = "";

        try {
            if (!ensureCsvStateMatchesFile(file)) {
                csvState = await parseCsvToState(file);
                openCsvModal(csvState);
                status.innerText = "Select the columns, then click “Use Selected Columns”.";
                return;
            }

            if (!csvState.records.length) throw new Error("No data rows found in the CSV.");
            if (!csvState.marksColumn) {
                openCsvModal(csvState);
                status.innerText = "Select the columns, then click “Use Selected Columns”.";
                return;
            }

            const records = csvState.records;
            const marksColumn = csvState.marksColumn;
            const nameColumn = csvState.nameColumn || "";

            for (let i = 0; i < records.length; i++) {
                status.innerText = `Generating quiz ${i + 1} of ${records.length}...`;

                const rowObject = records[i];
                const rowTextAll = buildRowTextAllColumns(rowObject);
                const rowTextFiltered = buildRowTextForAi(rowObject, marksColumn, nameColumn);
                const isMessy = shouldSendTxtToAi(rowObject);

                const basePayload = {
                    marksColumn,
                    nameColumn,
                    studentNameHint: nameColumn ? String(rowObject?.[nameColumn] ?? "").trim() : "",
                    score: rowObject?.[marksColumn] ?? "",
                    subject: document.getElementById('subject').value,
                    topic: document.getElementById('topic').value,
                    grade: document.getElementById('grade').value,
                    curriculum: document.getElementById('curriculum').value,
                    maxMarks: document.getElementById('mMax').value,
                    questionCount: parseInt(document.getElementById('qCount').value, 10),
                    answerFormat: document.getElementById('answerFormat').value,
                    requests: document.getElementById('requests').value
                };

                let quiz = null;
                try {
                    quiz = await requestQuiz({
                        ...basePayload,
                        // Always send uploaded CSV data as text format to the AI.
                        rowText: rowTextAll || rowTextFiltered
                    });
                } catch (e1) {
                    // If the CSV row is confusing or causes errors, retry with a smaller TXT version
                    // that focuses on the selected marks column + name/id-like fields.
                    if (isMessy && rowTextFiltered) {
                        quiz = await requestQuiz({ ...basePayload, rowText: rowTextFiltered });
                    } else {
                        throw e1;
                    }
                }

                const meta = {
                    subject: document.getElementById('subject').value,
                    topic: document.getElementById('topic').value,
                    grade: document.getElementById('grade').value,
                    curriculum: document.getElementById('curriculum').value,
                    maxMarks: document.getElementById('mMax').value,
                    answerFormat: document.getElementById('answerFormat').value
                };

                const card = document.createElement('div');
                card.className = 'quiz-card';

                const title = document.createElement('div');
                title.style.fontWeight = "800";
                title.style.marginBottom = "10px";
                title.innerText = quiz.studentName;

                const btnRow = document.createElement('div');
                btnRow.style.display = "flex";
                btnRow.style.gap = "10px";
                btnRow.style.flexWrap = "wrap";
                btnRow.style.marginBottom = "12px";

                const qBtn = document.createElement('button');
                qBtn.type = "button";
                qBtn.innerText = "Download Question PDF";
                qBtn.style.padding = "10px 12px";
                qBtn.style.marginTop = "0";

                const aBtn = document.createElement('button');
                aBtn.type = "button";
                aBtn.innerText = "Download Answer PDF";
                aBtn.style.padding = "10px 12px";
                aBtn.style.marginTop = "0";

                qBtn.onclick = async () => {
                    qBtn.disabled = true;
                    try {
                        const bytes = await buildWorksheetPdf({ quiz, meta, includeAnswers: false });
                        await downloadPdf(bytes, `${sanitizeFilename(quiz.studentName)} - Question Sheet.pdf`);
                    } finally {
                        qBtn.disabled = false;
                    }
                };

                aBtn.onclick = async () => {
                    aBtn.disabled = true;
                    try {
                        const bytes = await buildWorksheetPdf({ quiz, meta, includeAnswers: true });
                        await downloadPdf(bytes, `${sanitizeFilename(quiz.studentName)} - Answer Sheet.pdf`);
                    } finally {
                        aBtn.disabled = false;
                    }
                };

                btnRow.appendChild(qBtn);
                btnRow.appendChild(aBtn);

                const preview = document.createElement('pre');
                preview.innerText = quiz.questions.map(q => `${q.number}. ${q.question}`).join("\n\n");

                card.appendChild(title);
                card.appendChild(btnRow);
                card.appendChild(preview);
                output.appendChild(card);
            }
            status.innerText = "✅ All quizzes generated successfully!";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
