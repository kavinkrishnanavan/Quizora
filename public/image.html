<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Worksheet Marker</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f4f4f4;
text-align:center;
}

#results{
margin-top:30px;
max-width:700px;
margin-left:auto;
margin-right:auto;
background:white;
padding:20px;
border-radius:10px;
}

.question{
text-align:left;
border-bottom:1px solid #ddd;
padding:10px;
}

.correct{
color:green;
}

.incorrect{
color:red;
}

</style>
</head>

<body>

<h2>AI Worksheet Marker</h2>

<input type="file" id="imageInput" accept="image/*">
<br><br>

<button onclick="upload()">Mark Worksheet</button>

<div id="results"></div>

<script>

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=>resolve(reader.result);
reader.onerror = reject;
});
}

async function upload(){

const file = document.getElementById("imageInput").files[0];

if(!file){
alert("Upload an image first");
return;
}

document.getElementById("results").innerHTML="AI is grading...";

const base64 = await toBase64(file);

const response = await fetch("/.netlify/functions/image",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:base64
})
});

const data = await response.json();

renderResults(data.questions);

}

function renderResults(questions){

let html="";

questions.forEach((q,i)=>{

const checked = q.correct ? "checked" : "";

html += `
<div class="question">

<label>
<input type="checkbox" ${checked} onchange="updateScore()">
<strong>Question ${i+1}</strong>
</label>

<p><b>Student Answer:</b> ${q.student_answer}</p>
<p><b>Correct Answer:</b> ${q.correct_answer}</p>

<p>AI Score: ${q.score}</p>

</div>
`;

});

html += `<h3 id="totalScore"></h3>`;

document.getElementById("results").innerHTML = html;

updateScore();
}

function updateScore(){

const boxes = document.querySelectorAll(".question input");
let score = 0;

boxes.forEach(box=>{
if(box.checked) score += 1;
});

document.getElementById("totalScore").innerText =
"Teacher Score: "+score;

}

</script>

</body>
</html>
