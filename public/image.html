<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Worksheet Marker</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

#result{
margin-top:20px;
padding:20px;
border:1px solid #ccc;
background:white;
white-space:pre-wrap;
max-width:600px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h2>AI Worksheet Marker</h2>

<input type="file" id="imageInput" accept="image/*">
<br><br>

<button onclick="upload()">Mark Worksheet</button>

<div id="result"></div>

<script>

async function upload(){

const file = document.getElementById("imageInput").files[0];

if(!file){
alert("Upload an image first");
return;
}

const resultBox = document.getElementById("result");
resultBox.innerText = "Uploading image...";

const formData = new FormData();
formData.append("image", file);

const response = await fetch("/.netlify/functions/image",{
method:"POST",
body:formData
});

const data = await response.json();

resultBox.innerText = data.result || data.error;

}

</script>

</body>
</html>
