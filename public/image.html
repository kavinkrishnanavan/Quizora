<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Worksheet Marker</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

h2{
margin-bottom:20px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:25px;
background:white;
padding:20px;
border-radius:8px;
border:1px solid #ccc;
white-space:pre-wrap;
max-width:600px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h2>AI Worksheet Marker</h2>

<input type="file" id="imageInput" accept="image/*">
<br><br>

<button onclick="markWorksheet()">Mark Worksheet</button>

<div id="result"></div>

<script>

async function markWorksheet(){

const file = document.getElementById("imageInput").files[0];

if(!file){
alert("Please upload a worksheet image.");
return;
}

const resultBox = document.getElementById("result");

resultBox.innerText="Reading worksheet image...";

try{

// OCR step
const ocr = await Tesseract.recognize(
file,
"eng"
);

const extractedText = ocr.data.text;

resultBox.innerText="Text extracted. Sending to AI marker...";

// Send to Netlify function
const response = await fetch("/.netlify/functions/image",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:extractedText
})
});

const data = await response.json();

if(data.result){
resultBox.innerText=data.result;
}else{
resultBox.innerText="Error: "+data.error;
}

}catch(err){

resultBox.innerText="Error processing worksheet: "+err.message;

}

}

</script>

</body>
</html>
